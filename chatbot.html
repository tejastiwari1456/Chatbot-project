<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        margin-top:0px;
        margin-bottom:0px;
      }
      .send-button{
        background-color: rgb(52, 40, 229);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow:1;
      }

      .chat-input-container{
        display:flex;
        margin-bottom: 60px;

      }

      .app-container{
        max-width:600px;
        margin-left:auto;
        margin-right:auto;
        height: 100vh;
        display:flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      
      .chat-message-robot{
        display:flex;
        align-items: start;
      }

      .chat-message-text{
        background-color: rgb(238,238,238);
        padding:15px 20px;
        border-radius:10px;
        margin-right:10px;
        margin-left:10px;
        margin-bottom:20px;
        max-width: 300px;
        transition: transform 0.2s;
      }

      .chat-message-text:hover{
        transform: scale(1.05);
      }

      .chat-message-profile{
        width:45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .dark{
        background: linear-gradient(135deg, #1f1f1f, #2a2a2a);
        color:white;
      }
      .dark .chat-message-text{
        background: #2f2f2f;
        color:white;
        box-shadow: 0px 2px 6px rgba(0,0,0,0.5);
      }
      .dark .chat-input{
        background-color: #333;
        color:white;
        border: 1px solid #555;
      }
      .theme-button{
        margin:10px;
        padding:8px 14px;
        border:none;
        border-radius:8px;
        cursor: pointer;
      }
      .dark .chat-messages-container{
        background: rgba(255,255,255,0.05);
        border-radius: 15px;
        padding: 15px;
        margin: 10px;
        backdrop-filter: blur(6px);
      }
      .chat-message-user .chat-message-text{
        background: linear-gradient(135deg,#4f46e5,#6366f1);
        color:white;
      }

      .chat-message-text{
        animation: messagePop 0.25s ease;
      }

      @keyframes messagePop{
        from{
          transform: scale(0.9);
          opacity:0;
        }
        to{
          transform: scale(1);
          opacity:1;
        }
      }

      .dark .chat-input-container{
        background: rgba(255,255,255,0.04);
        padding:10px;
        border-radius:12px;
      }

      .welcome-text{
        color:#888;
        margin-bottom:15px;
        font-weight: 500;
        text-align: center;
      }




    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages =[
          ...chatMessages,
          {
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
          }
         ];

          setChatMessages(newChatMessages);

         setInputText('');

         setTimeout(()=>{
          const response = Chatbot.getResponse(inputText);
         setChatMessages([
          ...newChatMessages,
          {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
         ]);
         },800);
        }

        return (
        <div className="chat-input-container">
          <input 
            placeholder="Send a message to Chatbot" 
            size="30"
            onChange={saveInputText}
            onKeyDown={(event)=>{
              if(event.key === 'Enter'){
                sendMessage();
              }
            }}
            value={inputText}
            className="chat-input"
          />
          <button 
          onClick={sendMessage}
          className="send-button"
          >Send</button>
        </div>
        );
      }

      function ChatMessage({message, sender}){
        // const message = props.message;
        // const sender = props.sender;
        // const {message, sender} = props;

        /*
        if(sender === 'robot'){
          return(
            <div>
              <img src="chatbot_image.avif" width="50"/>
              {message}
          </div>
          );
        }
        */

        return (
            <div className={
              sender==='user'
                ? 'chat-message-user'
                :'chat-message-robot'
              }>
                { sender === 'robot' && (
                  <img src="chatbot_image.avif" className="chat-message-profile"/>
                )}
                <div className="chat-message-text">
                  {message}
                </div>
                {sender === 'user' && (
                  <img src="user.jpg" className="chat-message-profile"/>
                )}
            </div>
          );
        }

      function ChatMessages({chatMessages}){
        const chatMessagesRef = React.useRef(null);
        React.useEffect(()=>{
          const containerElem = chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }

        }, [chatMessages]);

        return (
          <div className="chat-messages-container"
          ref={chatMessagesRef}>
            {
              chatMessages.map((chatMessage)=>{
                return (
                  <ChatMessage 
                    message={chatMessage.message}
                    sender={chatMessage.sender}
                    key={chatMessage.id}
                  />
                );
              })
            }
         </div>
        );
      }


      function App(){
        const [chatMessages, setChatMessages] = React.useState([]);
        React.useEffect(()=>{
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme==="dark"){
          setDarkMode(true);
        }
        },[]);

        React.useEffect(()=>{
          localStorage.setItem("theme", darkMode ? "dark":"light");
        },[darkMode]);

        const [darkMode,setDarkMode] = React.useState(false);

        function toggleTheme(){
          setDarkMode(!darkMode);
        }

        // const [chatMessages, setChatMessages] = array;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];
        return (
          <div className={darkMode ? "app-container dark":"app-container"}>
            <button onClick={toggleTheme} className="theme-button">
              {darkMode ? "Light Mode": "Dark Mode"}
            </button>

            <ChatMessages 
            chatMessages = {chatMessages}
            />
            {chatMessages.length === 0 && (
            <div className="welcome-text">
              Welcome to the chatbot project! Send a message using the textbox above.
            </div>
          )}
            <ChatInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        )
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
